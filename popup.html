<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mail Organizer</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 18px;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        color: #17314d;
        background: linear-gradient(180deg, #edf4ff 0%, #f7fbff 100%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      p {
        margin: 0 0 10px;
        font-size: 13px;
        line-height: 1.7;
        color: #49627e;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: rgba(23, 49, 77, 0.08);
        border-radius: 6px;
        padding: 2px 6px;
      }

      .card {
        border: 1px solid rgba(23, 49, 77, 0.08);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.8);
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Mail Organizer</h1>
    <p>先在浏览器里打开并登录 OWA 邮箱页面，然后右侧会出现归档面板。</p>
    <div class="card">
      <p>支持页面：</p>
      <p><code>mail.xjtlu.edu.cn/owa</code></p>
      <p><code>outlook.office.com/mail</code></p>
    </div>
  </body>
</html>
